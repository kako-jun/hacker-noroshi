name = "hacker-noroshi"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "hacker-noroshi-db"
database_id = "185871af-76c3-403c-81c8-aede8f8cd100"

# Turnstile（#91 セルフ unban）。本番値は Cloudflare Pages dashboard
# または `wrangler pages secret put TURNSTILE_SECRET_KEY` で設定する。
# サイトキーは公開可。シークレットは secret として登録すること（vars には書かない）。
[vars]
# 'REPLACE_ME' は dev placeholder。本番値は Cloudflare Pages dashboard または wrangler pages secret put で設定
TURNSTILE_SITE_KEY = "REPLACE_ME"
# TURNSTILE_SECRET_KEY は wrangler pages secret put で設定する
